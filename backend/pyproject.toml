[tool.black]
line-length = 79
target-version = ["py39"]
exclude = '''
/( 
    \.git
  | \.venv
  | __pycache__
  | core/migrations
)/
'''

[tool.ruff]
line-length = 79
target-version = "py39"
extend-exclude = [
  "core/migrations",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
]
ignore = [
  "E501",
]

[tool.ruff.lint.isort]
combine-as-imports = false
force-single-line = false
