<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MoneyIO: Personal finance with calm clarity. Turn everyday money data into confident decisions." />
    <meta name="theme-color" content="#2f6bff" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="MoneyIO Team" />
    <meta name="keywords" content="finance, budgeting, money management, personal finance" />
    
    <!-- Open Graph tags for social media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://moneyio.example.com" />
    <meta property="og:title" content="MoneyIO - Personal Finance Manager" />
    <meta property="og:description" content="MoneyIO: Personal finance with calm clarity. Turn everyday money data into confident decisions." />
    <meta property="og:image" content="/logo.svg" />
    
    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://moneyio.example.com" />
    <meta name="twitter:title" content="MoneyIO - Personal Finance Manager" />
    <meta name="twitter:description" content="Turn everyday money data into confident decisions" />
    <meta name="twitter:image" content="/logo.svg" />
    
    <!-- Preconnect to Google Fonts for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Icon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Title and branding -->
    <title>MoneyIO - Personal Finance Manager</title>
    
    <!-- Fonts stylesheet -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap"
    />
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MoneyIO",
        "description": "Personal finance with calm clarity. Turn everyday money data into confident decisions.",
        "url": "https://moneyio.example.com",
        "applicationCategory": "FinanceApplication",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "image": "https://moneyio.example.com/logo.svg"
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
